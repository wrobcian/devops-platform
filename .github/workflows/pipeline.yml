name: DevOps Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: python -m py_compile app/main.py

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        working-directory: app
        run: python -m pytest tests/ -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-platform:${{ github.sha }} -f docker/Dockerfile .

      - name: Start container
        run: docker run -d -p 5000:5000 --name test-app devops-platform:${{ github.sha }}

      - name: Wait for app
        run: sleep 5

      - name: Health check
        run: curl -f http://localhost:5000/health

      - name: Test all endpoints
        run: |
          curl -f http://localhost:5000/
          curl -f http://localhost:5000/info
          curl -f http://localhost:5000/metrics
          curl -f http://localhost:5000/api/status

      - name: Stop container
        run: docker stop test-app

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

    kubernetes-validate:
    name: K8s Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          ./kubectl apply --dry-run=client -f kubernetes/deployment.yaml
          ./kubectl apply --dry-run=client -f kubernetes/service.yaml